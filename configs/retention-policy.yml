# AIOps Observability Store Retention Policy
#
# Defines how long different categories of observability data are retained
# in the Observability Store per GADS §3.2.
#
# Note: Governance Events written to the Immutable Ledger are NOT governed
# by this policy — they are retained indefinitely per GPS §4.5 and GOS §6.6.
# This policy covers only the Observability Store (time-bounded working data).
#
# Legal holds from LegalOps (GFDS §1.4) override all retention periods.
# A record subject to an active legal hold must not be disposed of regardless
# of the retention period below.

retention:

  # Security events: 7 years (2555 days)
  # Basis: common regulatory minimum for security audit data; GADS §3.2.
  # Applies to: all records from security domain, all SFR and SIR events,
  # all ISD gate results, all network anomaly events.
  security_events_days: 2555

  # Anomaly records: 7 years (2555 days)
  # Basis: anomaly history feeds GMEPS Meta-Evolution analysis of governance
  # pattern changes over time. GADS §3.2.
  # Applies to: all records where anomaly_tier != none.
  anomaly_records_days: 2555

  # Technical metrics: 2 years (730 days)
  # Basis: ITSM SLA evidence requirements; infrastructure trend analysis.
  # Applies to: availability metrics, pipeline performance, DORA metrics,
  # patch compliance metrics, infrastructure reconciliation state.
  technical_metrics_days: 730

  # Governance events (Observability Store copy): 2 years (730 days)
  # Basis: governance audit trail (authoritative copy is in Immutable Ledger;
  # this is the working copy for AIOps analysis).
  # Applies to: all records from governance domain in Observability Store.
  governance_events_days: 730

  # Financial telemetry: 7 years (2555 days)
  # Basis: financial audit and regulatory requirements.
  # Applies to: all records from financial domain.
  financial_telemetry_days: 2555

  # Identity events: 2 years (730 days)
  # Basis: access audit trail requirements; identity pattern baseline.
  # Applies to: all records from identity domain.
  identity_events_days: 730

  # Stakeholder signals: 3 years (1095 days)
  # Basis: SocietalOps disclosure history; Fidelity trend analysis.
  # Applies to: all records from stakeholder domain.
  stakeholder_signals_days: 1095

  # Adversarial intelligence: 3 years (1095 days)
  # Basis: threat pattern history for model retraining; GADS §2.7.
  # Applies to: all records from adversarial domain.
  adversarial_records_days: 1095

  # Standard telemetry (uncategorised): 90 days
  # Basis: operational working data with no compliance requirement.
  # Applies to: all records not matching the above categories.
  standard_telemetry_days: 90

  # Epistemic Field snapshots: 2 years (730 days)
  # Basis: EF history enables trend analysis of knowledge growth/degradation.
  # Applies to: EF state snapshots written after each AO4 cycle.
  epistemic_field_snapshots_days: 730

  # GC measurement records (Observability Store copy): indefinite
  # Basis: GC history is governance history. The Immutable Ledger holds the
  # authoritative signed copy; the Observability Store copy supports analysis.
  # Set to 0 to indicate indefinite retention.
  gc_measurement_days: 0

# Disposal method per category
# deletion:     cryptographic erasure of the data
# anonymisation: PII removed; structure and values retained for analysis
# archival:     moved to cold storage; not immediately queryable
disposal:
  security_events: deletion
  anomaly_records: deletion
  technical_metrics: deletion
  governance_events: deletion   # Immutable Ledger copy is authoritative
  financial_telemetry: deletion
  identity_events: deletion
  stakeholder_signals: anonymisation   # Stakeholder identity protected
  adversarial_records: deletion
  standard_telemetry: deletion
  epistemic_field_snapshots: deletion
  gc_measurement: archival      # Never delete governance capacity history

# Legal hold override
# When a LegalOps legal hold (GFDS §1.4) is active on records in the
# Observability Store, those records are tagged with the hold_id and
# excluded from all automated disposal runs until the hold is released.
legal_hold:
  enabled: true
  hold_registry_source: "LegalOps GPS alert messages (alert_type: legal_hold_activated)"
  disposal_suspension: immediate   # Suspension takes effect within 1 hour of hold activation
