# AIOps Anomaly Baseline Configuration
#
# Default baseline parameters for each observability domain.
# These values are applied from day 1 (conservative defaults).
# After 90 days of operational data the analysis engine computes
# domain-specific baselines from actual observations and these
# defaults are superseded.
#
# Each domain section defines the baseline for anomaly detection
# per GADS §4.2. Values are starting points — tune based on your
# governance environment once operational data accumulates.

baselines:

  technical:
    # Infrastructure availability — governance-critical CIs
    # Default: 0.999 target; flag when below
    governance_critical_availability:
      baseline_mean: 0.9995
      baseline_stddev: 0.0003
      # Alert if 3σ below mean (significant tier)
      alert_threshold_3sigma: 0.9986
    # Pipeline run success rate
    pipeline_success_rate:
      baseline_mean: 0.950
      baseline_stddev: 0.020
    # Patch compliance rate
    patch_compliance:
      baseline_mean: 0.980
      baseline_stddev: 0.010

  governance:
    # Policy exception rate (exceptions / total evaluations per day)
    policy_exception_rate:
      baseline_mean: 0.005
      baseline_stddev: 0.002
    # Gate bypass rate (bypasses / total gate evaluations per day)
    gate_bypass_rate:
      baseline_mean: 0.002
      baseline_stddev: 0.001
    # Decision cycle time (hours from propose to approve)
    decision_cycle_hours:
      baseline_mean: 24.0
      baseline_stddev: 8.0
    # DGC review completion rate (quarterly)
    dgc_review_rate:
      baseline_mean: 1.000
      baseline_stddev: 0.000   # binary — always 1.0 or flag immediately

  financial:
    # Daily expenditure per cost centre (relative to 90-day mean)
    expenditure_ratio:
      baseline_mean: 1.000
      baseline_stddev: 0.100
    # Over-authority event count per day
    over_authority_daily:
      baseline_mean: 0.0
      baseline_stddev: 0.1    # any over-authority event is notable
    # Attribution coverage
    attribution_coverage:
      baseline_mean: 0.998
      baseline_stddev: 0.001

  security:
    # New critical findings per day
    critical_findings_daily:
      baseline_mean: 0.0
      baseline_stddev: 0.5    # any critical finding is at least notable
    # SFR open finding count (total)
    sfr_open_count:
      baseline_mean: 10.0     # tune to your environment
      baseline_stddev: 3.0
    # Incident declaration rate per week
    incident_weekly:
      baseline_mean: 0.5
      baseline_stddev: 0.5

  identity:
    # Access events per actor per day (anomalous volume)
    access_events_per_actor:
      baseline_mean: 50.0
      baseline_stddev: 30.0
    # Privilege escalation events per day
    privilege_escalation_daily:
      baseline_mean: 0.1
      baseline_stddev: 0.1
    # IAL verification failures per day
    ial_verification_failures:
      baseline_mean: 0.0
      baseline_stddev: 0.2

  stakeholder:
    # Stakeholder feedback sentiment score (0-1)
    feedback_sentiment:
      baseline_mean: 0.800
      baseline_stddev: 0.050
    # Feedback volume per week
    feedback_weekly:
      baseline_mean: 10.0     # tune to your stakeholder base size
      baseline_stddev: 5.0
    # ISAF access events per month
    isaf_access_monthly:
      baseline_mean: 5.0
      baseline_stddev: 3.0

  adversarial:
    # Threat intelligence signals per day
    threat_signals_daily:
      baseline_mean: 5.0
      baseline_stddev: 3.0
    # Attack surface change events per week
    attack_surface_changes:
      baseline_mean: 2.0
      baseline_stddev: 1.0
