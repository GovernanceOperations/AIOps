name: AO1 — Continuous Ingestion

on:
  workflow_call:
    inputs:
      config-path:
        required: true
        type: string

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load configuration
        id: config
        run: |
          if [ ! -f "${{ inputs.config-path }}" ]; then
            echo "::error::aiops.yml not found at ${{ inputs.config-path }}"
            exit 1
          fi
          echo "config_valid=true" >> $GITHUB_OUTPUT

      - name: Verify source registry
        id: sources
        run: |
          REGISTRY=".github/govops/source-registry.json"
          if [ ! -f "$REGISTRY" ]; then
            echo "::error::source-registry.json not found. AIOps refuses data from unregistered sources."
            exit 1
          fi
          SOURCE_COUNT=$(jq '.sources | length' "$REGISTRY")
          ACTIVE_COUNT=$(jq '[.sources[] | select(.status == "active")] | length' "$REGISTRY")
          echo "Total registered sources: $SOURCE_COUNT"
          echo "Active sources: $ACTIVE_COUNT"
          echo "active_count=$ACTIVE_COUNT" >> $GITHUB_OUTPUT

          # Check each required domain has at least one active source
          for domain in technical governance financial security identity stakeholder adversarial; do
            DOMAIN_COUNT=$(jq --arg d "$domain" \
              '[.sources[] | select(.domain == $d and .status == "active")] | length' \
              "$REGISTRY")
            if [ "$DOMAIN_COUNT" -eq 0 ]; then
              echo "::warning::No active sources for domain: $domain — this domain will appear in Unknown EF region"
            fi
          done

      - name: Poll GPS Audit Interface sources
        env:
          AIOPS_LEDGER_API_KEY: ${{ secrets.AIOPS_LEDGER_API_KEY }}
          PROJOPS_AUDIT_KEY: ${{ secrets.PROJOPS_AUDIT_KEY }}
        run: |
          # Poll all gps_audit type sources from the registry
          REGISTRY=".github/govops/source-registry.json"
          GPS_SOURCES=$(jq -r '.sources[] | select(.type == "gps_audit" and .status == "active") | .source_id' "$REGISTRY")

          for source_id in $GPS_SOURCES; do
            echo "Polling GPS Audit source: $source_id"
            # In production: query the GPS §4.5 Audit Interface endpoint
            # configured for this source in aiops.yml, collect new events
            # since last poll timestamp, verify provenance, queue for AO2
            echo "::notice::GPS Audit source $source_id polled (production: implement endpoint call)"
          done

      - name: Validate provenance on ingested records
        run: |
          # Every ingested record must carry a valid provenance hash and signature.
          # Records failing provenance verification are classified as disputed
          # in the Epistemic Field — not rejected, but marked.
          # In production: implement per-record provenance verification
          # using the post-quantum signature verification per GPS §7.1.3
          echo "Provenance validation step — implement in production bridge"

      - name: Detect source gaps
        env:
          AIOPS_LEDGER_API_KEY: ${{ secrets.AIOPS_LEDGER_API_KEY }}
        run: |
          # For each registered active source, check last-seen timestamp.
          # If a source has not produced data within its expected interval,
          # produce a GPS alert of type observer_gap.
          REGISTRY=".github/govops/source-registry.json"
          GOVERNANCE_CRITICAL=$(jq -r '.sources[] | select(.governance_critical == true and .status == "active") | .source_id' "$REGISTRY")

          for source_id in $GOVERNANCE_CRITICAL; do
            echo "Checking gap for governance-critical source: $source_id"
            # In production: compare last-seen timestamp against
            # collection_lag_alert_seconds from aiops.yml for this domain.
            # If gap detected: call produce-governance-event action with
            # operation_type: alert, alert_type: observer_gap, severity: high
          done

      - name: Write ingestion record to ledger
        env:
          AIOPS_LEDGER_API_KEY: ${{ secrets.AIOPS_LEDGER_API_KEY }}
        run: |
          # Write a GPS sense operation to the Immutable Ledger confirming
          # the ingestion cycle completed and how many records were processed.
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%S.%6NZ")
          cat << EOF
          Ingestion cycle complete at $TIMESTAMP
          Next step: ao2-classification-routing
          EOF
