name: AO3 — Anomaly Detection and Escalation

on:
  workflow_call:
    inputs:
      config-path:
        required: true
        type: string

jobs:
  anomaly-detection:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load anomaly baselines
        id: baselines
        run: |
          if [ -f "configs/anomaly-baselines.yml" ]; then
            echo "Anomaly baselines loaded from configs/anomaly-baselines.yml"
            # In production: load per-domain baseline statistics
            # (mean, stddev, p95, p99) computed over rolling 90-day window.
            # If baseline is less than 7 days old, use conservative defaults
            # from the config file — the engine is still calibrating.
            BASELINE_AGE_DAYS=0  # replace with actual age check
            echo "baseline_age_days=$BASELINE_AGE_DAYS" >> $GITHUB_OUTPUT
          else
            echo "::warning::No anomaly baselines found — using conservative defaults. Baselines accumulate over 90 days."
          fi

      - name: Detect per-domain anomalies
        id: anomalies
        env:
          AIOPS_LEDGER_API_KEY: ${{ secrets.AIOPS_LEDGER_API_KEY }}
        run: |
          # Process pre-flagged records from AO2 queue.
          # For each pre-flagged record, compute final deviation score
          # and classify into alert tier per GADS §4.2.

          CRITICAL_COUNT=0
          SIGNIFICANT_COUNT=0
          NOTABLE_COUNT=0

          # --- Technical domain ---
          echo "Checking technical domain anomalies..."
          # In production: evaluate pre-flagged technical records
          # against baseline. Governance-critical CI availability drops
          # below 0.999 → significant tier minimum.

          # --- Governance domain ---
          echo "Checking governance domain anomalies..."
          # Exception rate spikes, gate bypass patterns, policy violation
          # rate increases — all evaluated here.

          # --- Financial domain ---
          echo "Checking financial domain anomalies..."
          # Over-authority events, unattributed expenditure spikes,
          # adverse variance breaches.

          # --- Security domain ---
          echo "Checking security domain anomalies..."
          # SFR critical finding count increases, SLO breach patterns,
          # incident severity distributions.

          # --- Identity domain ---
          echo "Checking identity domain anomalies..."
          # Privilege escalation sequences, dormant account activations,
          # unusual access timing distributions.

          # --- Stakeholder domain ---
          echo "Checking stakeholder domain anomalies..."
          # Feedback sentiment shifts, ISAF access pattern changes,
          # retaliation indicator co-occurrences.

          # --- Adversarial domain ---
          echo "Checking adversarial domain anomalies..."
          # Threat intelligence signal pattern changes,
          # attack surface expansion events.

          echo "critical_count=$CRITICAL_COUNT" >> $GITHUB_OUTPUT
          echo "significant_count=$SIGNIFICANT_COUNT" >> $GITHUB_OUTPUT
          echo "notable_count=$NOTABLE_COUNT" >> $GITHUB_OUTPUT

      - name: Run cross-domain correlation
        id: correlation
        env:
          AIOPS_LEDGER_API_KEY: ${{ secrets.AIOPS_LEDGER_API_KEY }}
        run: |
          # Check all six mandatory correlation patterns from GADS §4.3.
          # Each pattern operates over a sliding window (correlation_window_minutes).

          CORRELATION_TRIGGERS=0

          echo "Checking mandatory correlation patterns..."

          # Pattern 1: Security event + Financial anomaly
          echo "  P1: security + financial..."

          # Pattern 2: Identity anomaly + Governance bypass
          echo "  P2: identity + governance bypass..."

          # Pattern 3: Stakeholder signal decline + Disclosure delay
          echo "  P3: stakeholder decline + disclosure delay..."

          # Pattern 4: Multi-discipline alert spike (3+ disciplines, 1-hour window)
          echo "  P4: multi-discipline alert spike..."

          # Pattern 5: AI model drift + Data quality decline
          echo "  P5: AI drift + data quality..."

          # Pattern 6: Pipeline gate bypass spike + Security posture decline
          echo "  P6: pipeline bypass + security decline..."

          echo "correlation_triggers=$CORRELATION_TRIGGERS" >> $GITHUB_OUTPUT

      - name: Synthetic observation detection
        id: synthetic
        run: |
          # Run all four detection methods from GADS §4.4 and Appendix C
          # on all ingested records not yet classified as confirmed.

          SYNTHETIC_FLAGS=0

          echo "Running synthetic observation detection..."

          # Method 1: Statistical distribution testing
          # Real observations have characteristic distributions per domain.
          # Too-perfect distributions (exactly uniform, exactly normal) are flagged.
          echo "  Statistical distribution test..."

          # Method 2: Temporal sequence validation
          # Event sequences impossible given known system constraints are flagged.
          # e.g., a reconciliation completion before a reconciliation start.
          echo "  Temporal sequence validation..."

          # Method 3: Cross-source consistency checking
          # Independent sources observing the same event should be correlated
          # but not identical. Identical reports from independent sources are flagged.
          echo "  Cross-source consistency check..."

          # Method 4: Provenance chain anomaly detection
          # Provenance chains internally valid but inconsistent with
          # known source capabilities are flagged.
          echo "  Provenance chain anomaly check..."

          echo "synthetic_flags=$SYNTHETIC_FLAGS" >> $GITHUB_OUTPUT

      - name: Produce GPS alert operations
        env:
          AIOPS_LEDGER_API_KEY: ${{ secrets.AIOPS_LEDGER_API_KEY }}
        run: |
          CRITICAL=${{ steps.anomalies.outputs.critical_count }}
          SIGNIFICANT=${{ steps.anomalies.outputs.significant_count }}
          SYNTHETIC=${{ steps.synthetic.outputs.synthetic_flags }}
          CORRELATION=${{ steps.correlation.outputs.correlation_triggers }}

          # Critical anomalies → GPS alert severity critical + escalation
          if [ "${CRITICAL:-0}" -gt 0 ]; then
            echo "::error::$CRITICAL critical anomalies detected — producing GPS alert + escalation"
            # In production: write GPS alert to ledger with:
            #   alert_type: reality_integrity_failure or metric_drift per anomaly type
            #   severity: critical
            #   escalation_required: true
            #   escalation_deadline: <5 minutes from now>
            # Then write GPS escalation:
            #   escalation_path: oversight_body
            #   escalation_urgency: immediate
          fi

          # Significant anomalies → GPS alert severity high/medium
          if [ "${SIGNIFICANT:-0}" -gt 0 ]; then
            echo "::warning::$SIGNIFICANT significant anomalies detected — producing GPS alert"
            # In production: write GPS alert severity high
          fi

          # Synthetic observations → GPS alert severity critical + quarantine
          if [ "${SYNTHETIC:-0}" -gt 0 ]; then
            echo "::error::$SYNTHETIC synthetic observations flagged — quarantining and escalating"
            # In production:
            # 1. Mark flagged records as epistemic_region: disputed in Observability Store
            # 2. Write GPS alert: alert_type: reality_integrity_failure, severity: critical
            # 3. Write GPS escalation to Oversight Body within 5 minutes
          fi

          # Correlation pattern triggers → GPS alert per pattern
          if [ "${CORRELATION:-0}" -gt 0 ]; then
            echo "::warning::$CORRELATION cross-domain correlation patterns triggered"
            # In production: write one GPS alert per triggered pattern
            # with multi-domain payload identifying both domains involved
          fi

      - name: Baseline poisoning check
        run: |
          # If the anomaly baseline has shifted by more than the configured
          # threshold (default 20%) in the last 30 days, that shift itself
          # is an anomaly — potential adversarial baseline manipulation.
          SHIFT_THRESHOLD=$(grep 'baseline_shift_alert_threshold' aiops.yml.example | \
            awk '{print $2}' || echo "0.20")
          echo "Baseline shift threshold: $SHIFT_THRESHOLD"
          # In production: compare current 90-day baseline statistics
          # against the 30-day-prior statistics. If shift > threshold:
          # GPS alert severity high, alert_type: metric_drift,
          # description: "Anomaly baseline shift exceeds threshold — potential baseline poisoning"
