name: AO6 — Self-Observability

on:
  workflow_call:
    inputs:
      config-path:
        required: true
        type: string

jobs:
  self-monitoring:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Heartbeat — primary pipeline check
        id: heartbeat
        env:
          AIOPS_LEDGER_API_KEY: ${{ secrets.AIOPS_LEDGER_API_KEY }}
        run: |
          # The self-observability heartbeat is the first thing AO6 produces.
          # It is written via a DIRECT path to the GPS endpoint / Immutable Ledger
          # that does NOT route through the primary analysis pipeline.
          # This ensures a primary pipeline failure is detectable by external parties.
          #
          # Per GADS §6.6: the secondary self-observability channel must be
          # structurally independent of the primary data processing pipeline.
          # In GitHub Actions, this independence is achieved by:
          # 1. AO6 runs before all other processes in aiops-suite.yml (needs: nothing)
          # 2. AO6 uses a separate API call path — never via the analysis-engine bridge
          # 3. The heartbeat GPS message is signed with the deployment key and
          #    written directly to the Immutable Ledger append endpoint

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%S.%6NZ")
          HEARTBEAT_ID=$(uuidgen || cat /proc/sys/kernel/random/uuid)

          echo "::notice::AIOps heartbeat at $TIMESTAMP (id: $HEARTBEAT_ID)"
          echo "heartbeat_id=$HEARTBEAT_ID" >> $GITHUB_OUTPUT
          echo "heartbeat_timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT

          # In production: POST directly to ledger endpoint:
          # POST $LEDGER_ENDPOINT/govops/v1/audit/events
          # Body: GPS sense operation with:
          #   operation_type: sense
          #   sense_payload.observation_type: aiops_heartbeat
          #   sense_payload.source_identifiers: [aiops-self-monitor]
          #   governance_context.governance_capacity_state: last known Effective GC
          #   security.signature: signed with deployment key (not via analysis engine)

      - name: Check ingestion pipeline health
        id: ingestion-health
        run: |
          # Verify the AO1 ingestion pipeline is processing data.
          # Indicators of pipeline health:
          # - Last successful AO1 run timestamp within expected interval
          # - Queue depth not growing unboundedly (records accumulating without processing)
          # - No dead-letter queue accumulation

          echo "Checking ingestion pipeline health..."

          # In production: query the Observability Store for:
          # - last_ingestion_timestamp per domain
          # - queue_depth current vs 1-hour-ago
          # - dead_letter_count
          # Compare against thresholds from aiops.yml self_monitoring section

          INGESTION_HEALTHY=true
          echo "ingestion_healthy=$INGESTION_HEALTHY" >> $GITHUB_OUTPUT

      - name: Check analysis engine health
        id: analysis-health
        run: |
          # Verify the AO2/AO3 classification and anomaly detection is current.
          # An analysis engine that is ingesting but not classifying is a
          # partial failure — data accumulates without governance value.

          echo "Checking analysis engine health..."

          # In production: check:
          # - last_classification_timestamp (should be within ingestion lag + 30s)
          # - last_anomaly_check_timestamp
          # - last_correlation_check_timestamp (should be within 5 minutes)

          ANALYSIS_HEALTHY=true
          echo "analysis_healthy=$ANALYSIS_HEALTHY" >> $GITHUB_OUTPUT

      - name: Check Epistemic Field currency
        id: ef-health
        run: |
          # Verify the Epistemic Field has been updated in this cycle.
          # A stale EF means GC measurements are based on outdated
          # knowledge classifications.

          echo "Checking Epistemic Field currency..."

          # In production: check last_ef_update_timestamp from Observability Store.
          # If EF has not been updated within the expected AO4 run interval,
          # flag as degraded.

          EF_CURRENT=true
          echo "ef_current=$EF_CURRENT" >> $GITHUB_OUTPUT

      - name: Check domain coverage gaps
        id: coverage-gaps
        run: |
          # Quick coverage check (full audit is AO7 weekly).
          # Detect any domain that has gone silent since last cycle.

          echo "Checking domain coverage for gaps..."

          REGISTRY=".github/govops/source-registry.json"
          GAPS_FOUND=false

          for domain in technical governance financial security identity stakeholder adversarial; do
            SOURCE_COUNT=$(jq --arg d "$domain" \
              '[.sources[] | select(.domain == $d and .status == "active")] | length' \
              "$REGISTRY" 2>/dev/null || echo 0)

            if [ "$SOURCE_COUNT" -eq 0 ]; then
              echo "::warning::Domain $domain has no active sources in registry"
              GAPS_FOUND=true
            fi
          done

          echo "gaps_found=$GAPS_FOUND" >> $GITHUB_OUTPUT

      - name: Assess overall self-monitoring status
        id: overall-status
        run: |
          INGESTION=${{ steps.ingestion-health.outputs.ingestion_healthy }}
          ANALYSIS=${{ steps.analysis-health.outputs.analysis_healthy }}
          EF=${{ steps.ef-health.outputs.ef_current }}
          GAPS=${{ steps.coverage-gaps.outputs.gaps_found }}

          STATUS="healthy"

          if [ "$INGESTION" != "true" ] || [ "$ANALYSIS" != "true" ]; then
            STATUS="degraded"
            echo "::error::AIOps primary pipeline degraded — ingestion or analysis failing"
          elif [ "$EF" != "true" ]; then
            STATUS="degraded"
            echo "::warning::AIOps Epistemic Field not current"
          elif [ "$GAPS" == "true" ]; then
            STATUS="partial"
            echo "::warning::AIOps coverage gaps detected in one or more domains"
          fi

          echo "overall_status=$STATUS" >> $GITHUB_OUTPUT
          echo "AIOps self-monitoring status: $STATUS"

      - name: Produce degradation alert if needed
        if: steps.overall-status.outputs.overall_status != 'healthy'
        env:
          AIOPS_LEDGER_API_KEY: ${{ secrets.AIOPS_LEDGER_API_KEY }}
        run: |
          STATUS=${{ steps.overall-status.outputs.overall_status }}
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%S.%6NZ")

          echo "::error::Producing degradation alert at $TIMESTAMP — status: $STATUS"

          # Per GADS §6.6: self-monitoring failures produce GPS alert
          # severity critical of type degraded_observation.
          # This alert is written via the DIRECT path (not analysis engine).
          #
          # In production: POST directly to ledger endpoint:
          # GPS alert:
          #   alert_type: degraded_observation
          #   severity: critical
          #   escalation_required: true
          #   escalation_deadline: <15 minutes from now>
          #
          # The Oversight Body monitoring direct ledger access will detect
          # this alert and initiate AIOps recovery per GADS §7 Failure Modes.

      - name: Write self-monitoring record to ledger
        env:
          AIOPS_LEDGER_API_KEY: ${{ secrets.AIOPS_LEDGER_API_KEY }}
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%S.%6NZ")
          STATUS=${{ steps.overall-status.outputs.overall_status }}
          HEARTBEAT_ID=${{ steps.heartbeat.outputs.heartbeat_id }}

          echo "AO6 self-monitoring complete: $STATUS at $TIMESTAMP (heartbeat: $HEARTBEAT_ID)"

          # In production: write GPS record operation to Immutable Ledger:
          #   record_type: verification
          #   payload: self-monitoring status, component health checks,
          #            heartbeat_id, domain coverage summary
          # This record is the evidence trail the Oversight Body uses to
          # verify AIOps was operational at any given time.
